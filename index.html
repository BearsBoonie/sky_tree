<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>光遇好友树解锁记录</title>
<style>
  :root {
    --bg: #17161d;
    --bg2: #211f29;
    --panel: #26232e;
    --panel-2: #2c2934;
    --ink: #efe7df;
    --muted: #c5bcc2;
    --line: rgba(255,255,255,.88);
    --line-active: #e8d7a4;
    --active: #e8d7a4;
    --active-soft: rgba(232,215,164,.16);
    --shadow: 0 10px 32px rgba(0,0,0,.28);
    --lv: #a27a86;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(circle at top, #282533 0%, #1e1c24 42%, #17161d 100%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  }
  .app { max-width: 980px; margin: 0 auto; padding: 18px 12px 40px; }
  .toolbar {
    position: sticky; top: 0; z-index: 30;
    display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px;
    align-items: center;
    padding: 12px; margin-bottom: 14px;
    background: rgba(37,34,46,.9); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.08); border-radius: 18px; box-shadow: var(--shadow);
  }
  .namebox { display: flex; gap: 8px; align-items: center; min-width: 0; }
  .namebox label { white-space: nowrap; color: #d9d0d6; font-size: 14px; }
  input[type="text"] {
    width: 100%; min-width: 110px; height: 40px; border: 1px solid rgba(255,255,255,.14);
    border-radius: 12px; padding: 0 12px; outline: none; font-size: 15px;
    background: #1e1b25; color: var(--ink);
  }
  input[type="text"]:focus { border-color: #a27a86; box-shadow: 0 0 0 3px rgba(162,122,134,.16); }
  button, .tiny-toggle {
    border: 1px solid rgba(255,255,255,.12); background: #221f2a; color: #ece3db;
    min-height: 40px; border-radius: 12px; padding: 0 12px; cursor: pointer; font-size: 14px;
  }
  button:hover { background: #2b2732; border-color: rgba(255,255,255,.22); }
  .tiny-toggle { display:flex; align-items:center; gap:6px; user-select:none; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat {
    background: rgba(37,34,46,.86); border: 1px solid rgba(255,255,255,.08); border-radius: 16px;
    padding: 10px 12px; box-shadow: 0 4px 18px rgba(0,0,0,.18);
  }
  .stat b { display:block; font-size: 20px; color: #f1dfb6; }
  .stat span { font-size: 12px; color: #c8bfc5; }
  .progress-card {
    background: rgba(37,34,46,.86);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 16px;
    padding: 10px 12px 12px;
    margin: -4px 0 14px;
    box-shadow: 0 4px 18px rgba(0,0,0,.18);
  }
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 13px;
    color: #d9d0d6;
  }
  .progress-row b { color: #f1dfb6; font-size: 15px; }
  .progress-track {
    height: 10px;
    width: 100%;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(255,255,255,.12);
    box-shadow: inset 0 1px 4px rgba(0,0,0,.24);
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    border-radius: inherit;
    background: linear-gradient(90deg, rgba(232,215,164,.68), rgba(232,215,164,1));
    box-shadow: 0 0 10px rgba(232,215,164,.35);
    transition: width .22s ease;
  }
  .tree-wrap {
    width: 100%;
    overflow-x: auto;
    overflow-y: visible;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 6px;
  }
  .tree-shell {
    position: relative; width: 760px; height: 4860px; margin: 0 auto;
    background: linear-gradient(180deg, #25222d 0%, #1e1c24 100%);
    border-radius: 22px; border: 1px solid rgba(255,255,255,.08);
    overflow: hidden; box-shadow: var(--shadow);
  }
  .tree-note {
    position: absolute; top: 12px; left: 14px; right: 14px; z-index: 9;
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    pointer-events: none; color: #d7cfd6; font-size: 13px;
  }
  .tree-note .pill {
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08);
    border-radius: 999px; padding: 5px 10px;
  }
  #edges { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  #costLayer { position:absolute; inset:0; pointer-events:none; z-index:5; }
  .edge-line { stroke: var(--line); stroke-width: 2.6; stroke-linecap: round; opacity: .9; transition: .18s; }
  .edge-line.active { stroke: var(--line-active); stroke-width: 3.4; opacity: 1; filter: drop-shadow(0 0 4px rgba(232,215,164,.28)); }
  .node {
    position:absolute; width: 82px; min-height: 104px; height: auto; transform: translate(-50%, -50%);
    z-index: 8; border: 0; background: transparent; padding: 0; display: grid;
    justify-items: center; align-content: center; gap: 4px; cursor: pointer; overflow: visible;
  }
  .node .icon-wrap {
    width: 62px; height: 62px; display:flex; align-items:center; justify-content:center;
    border-radius: 24px; transition: .18s ease;
  }
  .node img { max-width: 60px; max-height: 60px; transition: .18s ease; }
  .node:not(.active) img { filter: grayscale(.25) brightness(.86) opacity(.5); }
  .node:not(.active) .icon-wrap { opacity: .96; }
  .node.active .icon-wrap {
    background: radial-gradient(circle, rgba(232,215,164,.19) 0%, rgba(232,215,164,.03) 70%);
    box-shadow: 0 0 0 1px rgba(232,215,164,.08), 0 0 24px rgba(232,215,164,.12);
  }
  .node:hover .icon-wrap { transform: translateY(-2px) scale(1.04); }
  .node.fixed { min-height: 132px; }
  .node.fixed { cursor: default; }
  .node-label {
    font-size: 11px; line-height: 1; color: #e7dfe5; white-space: nowrap; opacity: 0;
    transform: translateY(-2px); transition: .15s; background: rgba(18,18,22,.68);
    border: 1px solid rgba(255,255,255,.08); border-radius: 999px; padding: 3px 8px;
  }
  .show-labels .node-label, .node:hover .node-label { opacity: 1; transform: translateY(0); }
  .friend-name {
    display: block;
    position: absolute; top: 88px; left: 50%; transform: translateX(-50%); width: 170px; text-align: center; font-size: 12px; font-weight: 650; color: #f0e7df; margin-top: 0;
    max-width: 170px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    text-shadow: 0 1px 4px rgba(0,0,0,.45);
    z-index: 4;
  }
  .lv-tag {
    position:absolute; right: -10px; top: 6px; font-weight: 700; font-size: 15px;
    color: #a27a86; text-shadow: 0 1px 4px rgba(0,0,0,.5);
  }
  .cost-badge {
    position:absolute; z-index: 6; display: inline-flex; align-items: center; gap: 5px;
    height: 22px; font-size: 16px; font-weight: 560; color: #f5f0ea; line-height: 1;
    transition: .16s; background: rgba(10,10,14,.38); border: 1px solid rgba(255,255,255,.06);
    border-radius: 999px; padding: 1px 6px 1px 4px; pointer-events: none;
  }
  .cost-badge.inactive { color: rgba(255,255,255,.72); opacity: .72; }
  .cost-badge.inactive .cost-icon-img { filter: grayscale(.1) brightness(.84) opacity(.8); }
  .cost-icon-img { width: 18px; height: 18px; object-fit: contain; display: block; flex: none; filter: drop-shadow(0 1px 2px rgba(0,0,0,.32)); }
  .legend { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top: 14px; }
  .legend-item { display:inline-flex; align-items:center; gap:6px; background: rgba(37,34,46,.82); border:1px solid rgba(255,255,255,.08); border-radius:999px; padding:6px 10px; }
  .legend-cost-icon { width: 20px; height: 20px; object-fit: contain; display: inline-block; filter: drop-shadow(0 1px 1px rgba(0,0,0,.28)); }
  .toast {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(20px);
    background: rgba(19,17,24,.94); color:white; border-radius: 999px; padding: 9px 14px;
    font-size: 13px; opacity:0; transition:.2s; z-index: 99; pointer-events:none; border:1px solid rgba(255,255,255,.08);
  }
  .toast.show { opacity:1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 720px) {
    .app { padding: 6px 2px 28px; }
    .toolbar {
      position: static;
      top: auto;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 14px;
    }
    .namebox { grid-column: 1 / -1; gap: 6px; }
    .namebox label { font-size: 12px; }
    input[type="text"] { height: 34px; font-size: 13px; border-radius: 10px; }
    button, .tiny-toggle { min-height: 32px; padding: 0 8px; font-size: 12px; border-radius: 10px; justify-content: center; }
    .stats { grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 8px; }
    .stat { padding: 6px 6px; border-radius: 12px; }
    .stat b { font-size: 16px; }
    .stat span { font-size: 10px; }
    .progress-card { padding: 7px 8px 9px; margin: -2px 0 8px; border-radius: 12px; }
    .progress-row { font-size: 11px; margin-bottom: 6px; }
    .progress-row b { font-size: 13px; }
    .progress-track { height: 8px; }
    .tree-wrap { overflow-x: hidden; overflow-y: hidden; padding-bottom: 0; }
    .tree-shell { width: 760px; min-width: 760px; margin: 0; }
    .node { width: 72px; min-height: 92px; }
    .node.fixed { min-height: 120px; }
    .node .icon-wrap { width: 54px; height: 54px; }
    .node img { max-width: 52px; max-height: 52px; }
    .node-label { position: absolute; top: 58px; left: 50%; transform: translateX(-50%); font-size: 9px; max-width: 72px; padding: 2px 4px; }
    .show-labels .node-label, .node:hover .node-label { transform: translateX(-50%); }
    .node.fixed { min-height: 138px; }
    .friend-name { top: 76px; font-size: 11px; width: 120px; }
    .lv-tag { font-size: 13px; right: -6px; }
    .cost-badge { height: 20px; font-size: 14px; padding: 1px 5px 1px 4px; }
    .cost-icon-img { width: 16px; height: 16px; }
    .legend { justify-content: flex-start; gap: 6px; margin-top: 8px; }
    .legend-item { font-size: 11px; padding: 5px 8px; }
    .tree-note { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="namebox">
      <label for="friendName">好友名字</label>
      <input id="friendName" type="text" placeholder="输入好友名字" value="我的好友" />
    </div>
    <button id="scrollBottom">回到底部</button>
    <button id="resetTree">重置</button>
    <label class="tiny-toggle"><input id="toggleNames" type="checkbox" /> 显示名称</label>
  </div>

  <div class="stats">
    <div class="stat"><b id="unlockedCount">0</b><span>已点亮节点</span></div>
    <div class="stat"><b id="candleCount">0</b><span>累计白蜡烛</span></div>
    <div class="stat"><b id="ascendedCount">0</b><span>累计红蜡烛</span></div>
  </div>

  <div class="progress-card">
    <div class="progress-row"><span>解锁进度</span><b id="unlockPercent">0%</b></div>
    <div class="progress-track" aria-label="解锁进度"><div class="progress-fill" id="unlockProgressBar"></div></div>
  </div>

  <div class="tree-wrap">
    <div id="tree" class="tree-shell">
      <div class="tree-note">
        <span class="pill">点击图标：点亮该节点及前置节点</span>
        <span class="pill">再次点击已点亮图标：取消该节点及后续节点</span>
      </div>
      <svg id="edges" viewBox="0 0 760 4860" preserveAspectRatio="none"></svg>
      <div id="costLayer"></div>
      <div id="nodeLayer"></div>
    </div>
  </div>

  <div class="legend">
    <span class="legend-item" id="whiteLegendIcon">白蜡烛</span>
    <span class="legend-item" id="redLegendIcon">红蜡烛 / 升华蜡烛</span>
    <span class="legend-item">白线 = 未解锁，淡黄色 = 已解锁</span>
  </div>
</div>
<div id="toast" class="toast"></div>

  gift_cart: 'fist_bump',
  warp: 'hair_tousle',
  report_player: 'handhold'
};
for (const [id, base] of Object.entries(rightSimple)) {
  display[id] = above(base, RIGHT_X - CENTER_X);
}
// 特殊右侧分支：双人舞从“背背”右上伸出，二级在一级正上方；勾肩搭背从“熊抱”右上伸出，二级在一级正上方。
display.double_dancing = above('piggyback', RIGHT_X - CENTER_X);
if (nodeById['double_dancing_lv2']) display.double_dancing_lv2 = { x: RIGHT_X, y: display.double_dancing.y - STEP };
display.reassure = above('bear_hug', RIGHT_X - CENTER_X);
if (nodeById['reassure_lv2']) display.reassure_lv2 = { x: RIGHT_X, y: display.reassure.y - STEP };
// Bottom utilities and moderation column
display.favorite_friend = above('edit', LEFT_X - CENTER_X);
// 底部功能区：备注右上为“屏蔽”，其上方为“举报”；禁聊垂直放在“聊天”正上方。
display.block_player = above('edit', RIGHT_X - CENTER_X);
display.report_player = { x: RIGHT_X, y: display.gift_heart.y + STEP };
display.mute_chat = { x: RIGHT_X, y: display.chat.y - STEP };
// Right-side level chains
if (nodeById['light_scholar_lv3']) display.light_scholar_lv3 = above('light_scholar', RIGHT_X - CENTER_X);
if (nodeById['light_scholar_lv4']) display.light_scholar_lv4 = { x: RIGHT_X, y: display.light_scholar_lv3.y - STEP };
if (nodeById['celebration_lv3']) display.celebration_lv3 = above('celebration', RIGHT_X - CENTER_X);
if (nodeById['celebration_lv4']) display.celebration_lv4 = { x: RIGHT_X, y: display.celebration_lv3.y - STEP };
// Ensure all nodes have a display position fallback
for (const n of NODES) {
  if (!display[n.id]) display[n.id] = { x: n.x, y: n.y };
}

// 仅用于视觉连线，不参与前置节点计算。
const EXTRA_EDGES = [
  { fr: 'block_player', to: 'report_player' },
  { fr: 'chat', to: 'mute_chat' }
];

function center(n) {
  return display[n.id] || {x:n.x, y:n.y};
}
function trimmedLine(a, b, pad = 40) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const len = Math.hypot(dx, dy) || 1;
  const effectivePad = window.innerWidth <= 720 ? 56 : pad;
  const trim = Math.min(effectivePad, Math.max(0, len / 2 - 4));
  const ux = dx / len;
  const uy = dy / len;
  return { x1: a.x + ux * trim, y1: a.y + uy * trim, x2: b.x - ux * trim, y2: b.y - uy * trim };
}
function iconTag(type) {
  const src = type === 'ascended' ? COST_ICONS.ascended : COST_ICONS.candle;
  const alt = type === 'ascended' ? '红蜡烛' : '白蜡烛';
  return `<img class="cost-icon-img" src="${src}" alt="${alt}">`;
}
function costPositionFor(node) {
  const p = center(node);
  const mobile = window.innerWidth <= 720;
  const showNames = !!toggleNames.checked;
  const leftDx = mobile ? (showNames ? 58 : 54) : 82;
  const rightDx = mobile ? (showNames ? 8 : 4) : 14;
  const dy = mobile ? (showNames ? 8 : 14) : 26;
  // 左侧分支：图标左下；右侧分支：图标右下；主干默认左下。
  if (p.x < CENTER_X - 40) return { x: p.x - leftDx, y: p.y + dy };
  if (p.x > CENTER_X + 40) return { x: p.x + rightDx, y: p.y + dy };
  return { x: p.x - leftDx, y: p.y + dy };
}
function edgeActive(e) { return active.has(e.fr) && active.has(e.to); }
function toast(text) {
  const el = document.getElementById('toast');
  el.textContent = text; el.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => el.classList.remove('show'), 1100);
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function applyResponsiveTree() {
  if (!treeWrap || !tree) return;
  const mobile = window.innerWidth <= 720;
  if (mobile) {
    // 手机端不改变树内部几何关系，只整体放大并裁掉左右空白，保持斜线仍为 45°。
    const cropLeft = 125;
    const cropRight = 635;
    const contentWidth = cropRight - cropLeft;
    const available = Math.max(280, treeWrap.clientWidth - 2);
    const scale = Math.min(1, available / contentWidth);
    tree.style.transform = `scale(${scale})`;
    tree.style.transformOrigin = 'top left';
    tree.style.marginLeft = `${-cropLeft * scale}px`;
    // transform 缩放不会改变元素原始布局高度；手机端必须裁掉原始高度产生的滚动空白。
    const mobileContentBottom = 4848;
    treeWrap.style.height = `${mobileContentBottom * scale}px`;
    treeWrap.style.overflowX = 'hidden';
    treeWrap.style.overflowY = 'hidden';
  } else {
    tree.style.transform = '';
    tree.style.transformOrigin = '';
    tree.style.marginLeft = '0';
    treeWrap.style.height = '';
    treeWrap.style.overflowX = 'auto';
    treeWrap.style.overflowY = 'visible';
  }
}

function render() {
  tree.classList.toggle('show-labels', toggleNames.checked);
  edgeSvg.innerHTML = '';
  costLayer.innerHTML = '';
  nodeLayer.innerHTML = '';

  for (const e of [...EDGES, ...EXTRA_EDGES]) {
    const a = center(nodeById[e.fr]);
    const b = center(nodeById[e.to]);
    const t = trimmedLine(a, b);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', t.x1); line.setAttribute('y1', t.y1);
    line.setAttribute('x2', t.x2); line.setAttribute('y2', t.y2);
    line.setAttribute('class', 'edge-line' + (edgeActive(e) ? ' active' : ''));
    edgeSvg.appendChild(line);

    if (e.cost !== null && e.cost !== undefined) {
      const badge = document.createElement('div');
      badge.className = 'cost-badge' + (edgeActive(e) ? '' : ' inactive');
      const p = costPositionFor(nodeById[e.to]);
      badge.style.left = `${p.x}px`;
      badge.style.top = `${p.y}px`;
      badge.innerHTML = `<span>${e.cost}</span>${iconTag(e.costType)}`;
      costLayer.appendChild(badge);
    }
  }

  for (const n of NODES) {
    const btn = document.createElement('button');
    btn.className = 'node' + (active.has(n.id) ? ' active' : '') + (n.fixed ? ' fixed' : '');
    const p = center(n);
    btn.style.left = `${p.x}px`;
    btn.style.top = `${p.y}px`;
    btn.title = n.level ? `${n.name} ${n.level}` : n.name;
    btn.dataset.id = n.id;
    const friendLabel = n.id === 'edit' ? `<div class="friend-name" id="friendNameOnTree">${escapeHtml(friendInput.value || '我的好友')}</div>` : '';
    const lv = n.level ? `<span class="lv-tag">${n.level}</span>` : '';
    btn.innerHTML = `${lv}<span class="icon-wrap"><img alt="${escapeHtml(n.name)}" src="${ICONS[n.icon] || ''}"></span><span class="node-label">${escapeHtml(n.name)}</span>${friendLabel}`;
    btn.addEventListener('click', () => onNodeClick(n.id));
    nodeLayer.appendChild(btn);
  }
  applyResponsiveTree();
  updateStats();
}
function ancestorsOf(id, out = new Set()) {
  for (const p of parents.get(id) || []) {
    if (!out.has(p)) { out.add(p); ancestorsOf(p, out); }
  }
  return out;
}
function descendantsOf(id, out = new Set()) {
  for (const c of children.get(id) || []) {
    if (!out.has(c)) { out.add(c); descendantsOf(c, out); }
  }
  return out;
}
function onNodeClick(id) {
  const n = nodeById[id];
  if (!n || n.fixed) return;
  if (active.has(id)) {
    const remove = descendantsOf(id);
    remove.add(id);
    for (const x of remove) if (!nodeById[x]?.fixed) active.delete(x);
    toast(`已取消：${n.name}`);
  } else {
    const add = ancestorsOf(id);
    add.add(id);
    for (const x of add) active.add(x);
    toast(`已点亮：${n.name}`);
  }
  saveState(); render();
}
function updateStats() {
  const activeEdges = EDGES.filter(e => active.has(e.fr) && active.has(e.to));
  const candle = activeEdges.filter(e => e.costType !== 'ascended').reduce((s,e) => s + (Number(e.cost) || 0), 0);
  const asc = activeEdges.filter(e => e.costType === 'ascended').reduce((s,e) => s + (Number(e.cost) || 0), 0);
  const unlockableNodes = NODES.filter(n => !n.fixed);
  const unlockedNodes = unlockableNodes.filter(n => active.has(n.id));
  const percent = unlockableNodes.length ? Math.round((unlockedNodes.length / unlockableNodes.length) * 1000) / 10 : 0;
  document.getElementById('unlockedCount').textContent = active.size;
  document.getElementById('candleCount').textContent = candle;
  document.getElementById('ascendedCount').textContent = asc;
  const percentText = document.getElementById('unlockPercent');
  const percentBar = document.getElementById('unlockProgressBar');
  if (percentText) percentText.textContent = `${percent}%（${unlockedNodes.length}/${unlockableNodes.length}）`;
  if (percentBar) percentBar.style.width = `${Math.max(0, Math.min(100, percent))}%`;
}
function saveState() {
  const payload = { name: friendInput.value, active: [...active] };
  localStorage.setItem('sky_friend_tree_state_v5', JSON.stringify(payload));
}
function loadState() {
  try {
    const raw = localStorage.getItem('sky_friend_tree_state_v5');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.name) friendInput.value = data.name;
    if (Array.isArray(data.active)) {
      active = new Set(data.active.filter(id => nodeById[id]));
      for (const n of NODES.filter(n => n.defaultActive || n.fixed)) active.add(n.id);
    }
  } catch (e) {}
}
friendInput.addEventListener('input', () => { saveState(); render(); });
toggleNames.addEventListener('change', render);
document.getElementById('resetTree').addEventListener('click', () => {
  active = new Set(NODES.filter(n => n.defaultActive).map(n => n.id));
  saveState(); render(); toast('已重置好友树');
});
document.getElementById('scrollBottom').addEventListener('click', () => {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
});
document.getElementById('whiteLegendIcon').innerHTML = `${iconTag('candle')} 白蜡烛`;
document.getElementById('redLegendIcon').innerHTML = `${iconTag('ascended')} 红蜡烛`;
window.addEventListener('resize', () => { applyResponsiveTree(); });
loadState();
render();
window.addEventListener('load', () => {
  setTimeout(() => {
    applyResponsiveTree();
    window.scrollTo({ top: document.body.scrollHeight });
  }, 80);
});
</script>
</body>
</html>
